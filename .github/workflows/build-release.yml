name: Windows Executable CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_rolling_release:
        description: "Publish/update rolling latest-main release"
        required: true
        default: true
        type: boolean
      publish_tag_release:
        description: "Publish tag release when ref is v*"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            scripts/setup/requirements_windows.txt
            pyproject.toml

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/setup/requirements_windows.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build portable bundle
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/setup/build_windows_exe.ps1 -Clean

      - name: Build one-file executable
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/setup/build_windows_exe.ps1 -OneFile

      - name: Prepare stable release assets
        shell: pwsh
        run: |
          $portable = Get-ChildItem "dist/packages" -Filter "*-portable.zip" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $portable) { throw "Portable zip not found in dist/packages." }
          Copy-Item -Path $portable.FullName -Destination "dist/packages/VoiceFlow-portable-win64.zip" -Force

          if (-not (Test-Path "dist/VoiceFlow.exe")) { throw "One-file executable not found at dist/VoiceFlow.exe." }
          Copy-Item -Path "dist/VoiceFlow.exe" -Destination "dist/packages/VoiceFlow-win64.exe" -Force

          $portableHash = (Get-FileHash "dist/packages/VoiceFlow-portable-win64.zip" -Algorithm SHA256).Hash.ToLower()
          $exeHash = (Get-FileHash "dist/packages/VoiceFlow-win64.exe" -Algorithm SHA256).Hash.ToLower()

          @(
            "$portableHash  VoiceFlow-portable-win64.zip"
            "$exeHash  VoiceFlow-win64.exe"
          ) | Set-Content -Path "dist/packages/SHA256SUMS.txt" -Encoding UTF8

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voiceflow-windows-release-assets
          path: |
            dist/packages/VoiceFlow-portable-win64.zip
            dist/packages/VoiceFlow-win64.exe
            dist/packages/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

  release-latest-main:
    runs-on: ubuntu-latest
    needs: build-windows
    if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || github.event.inputs.publish_rolling_release == 'true')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: voiceflow-windows-release-assets
          path: release-assets

      - name: Publish rolling main release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: VoiceFlow Latest (main)
          prerelease: true
          draft: false
          make_latest: false
          target_commitish: ${{ github.sha }}
          body: |
            Rolling build from `main`.

            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
          files: |
            release-assets/VoiceFlow-portable-win64.zip
            release-assets/VoiceFlow-win64.exe
            release-assets/SHA256SUMS.txt
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-tag:
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || github.event.inputs.publish_tag_release == 'true')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: voiceflow-windows-release-assets
          path: release-assets

      - name: Publish tag release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VoiceFlow ${{ github.ref_name }}
          prerelease: false
          draft: false
          make_latest: true
          body: |
            Windows release artifacts for VoiceFlow:

            - `VoiceFlow-win64.exe` (single-file executable)
            - `VoiceFlow-portable-win64.zip` (portable bundle)
            - `SHA256SUMS.txt` (checksums)
          files: |
            release-assets/VoiceFlow-portable-win64.zip
            release-assets/VoiceFlow-win64.exe
            release-assets/SHA256SUMS.txt
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
