name: Runtime Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  runtime-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            scripts/setup/requirements_windows.txt
            pyproject.toml

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/setup/requirements_windows.txt
          pip install -e .

      - name: Run runtime regression suite
        shell: pwsh
        run: |
          pytest -q tests/runtime
